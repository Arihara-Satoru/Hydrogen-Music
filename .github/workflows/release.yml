name: Release

on:
  push:
    branches:
      - KuGou
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          fetch-depth: 0

      - name: Checkout KuGouMusicApi
        uses: actions/checkout@v4
        with:
          repository: MakcRe/KuGouMusicApi
          path: KuGouMusicApi
          token: ${{ github.token }}
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install KuGouMusicApi dependencies
        working-directory: KuGouMusicApi
        run: npm install --no-audit --no-fund

      - name: Download pre-built sidecar binary
        id: download-sidecar
        run: |
          mkdir -Force src-tauri/binaries
          Write-Host "📥 Downloading sidecar binary from sidecar-bin release..."
          gh release download sidecar-bin --pattern "sidecar-server-x86_64-pc-windows-msvc.exe" --dir src-tauri/binaries 2>&1
          if (Test-Path "src-tauri/binaries/sidecar-server-x86_64-pc-windows-msvc.exe") {
            $size = (Get-Item "src-tauri/binaries/sidecar-server-x86_64-pc-windows-msvc.exe").Length / 1MB
            Write-Host "✅ Downloaded sidecar binary ($('{0:N1}' -f $size) MB)"
            echo "downloaded=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
            Write-Host "⚠️ Download failed, will build from source"
            echo "downloaded=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build sidecar binary from source (fallback)
        if: steps.download-sidecar.outputs.downloaded != 'true'
        run: node scripts/build-kugou-api.cjs

      - name: Setup MSVC build tools
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Create GitHub Release
        run: npm run release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}

      - name: Upload sidecar binary to sidecar-bin release
        run: |
          if (Test-Path "src-tauri/binaries/sidecar-server-x86_64-pc-windows-msvc.exe") {
            gh release view sidecar-bin 2>$null
            if ($LASTEXITCODE -ne 0) {
              Write-Host "📦 Creating sidecar-bin release..."
              gh release create sidecar-bin --title "Sidecar Binary" --prerelease --notes "Pre-built sidecar binary for Tauri build pipeline"
            }
            gh release upload sidecar-bin src-tauri/binaries/sidecar-server-x86_64-pc-windows-msvc.exe --clobber
            Write-Host "✅ Sidecar binary uploaded to sidecar-bin release"
          } else {
            Write-Host "⚠️ Sidecar binary not found, skipping upload"
          }
        env:
          GH_TOKEN: ${{ github.token }}